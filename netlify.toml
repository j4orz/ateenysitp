[build]
command = "rustup toolchain install nightly-2026-05-01 --component rust-src --component rustc-dev --component llvm-tools-preview --component miri && cargo install mdbook --version 0.5.2 --locked && cargo install mdbook-katex --git https://github.com/lzanini/mdbook-katex && cargo install mdbook-aquascope --locked && cargo install mdbook-quiz --locked && cargo +nightly-2026-05-01 install aquascope_front --git https://github.com/cognitive-engineering-lab/aquascope && cargo install mdbook-repl --git https://github.com/j4orz/mdbook-repl && curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none && export PATH=\"$HOME/.elan/bin:$PATH\" && cd sitp && mdbook build"
publish = "sitp/book"
